services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  open-brain:
    build: .
    ports:
      - "3737:3737"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_URL=http://qdrant:6334
      - PORT=3737
      - RUST_LOG=info
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
